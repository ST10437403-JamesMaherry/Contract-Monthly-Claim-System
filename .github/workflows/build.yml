name: Build

on:
  push:
    branches:
      - "**"
  pull_request:
    branches:
      - master
      - main

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build:
    name: Build ASP.NET Core app
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore packages
        run: dotnet restore "./Contract Monthly Claim System/Contract Monthly Claim System.csproj"

      - name: Build
        run: dotnet build "./Contract Monthly Claim System/Contract Monthly Claim System.csproj" --configuration Release --no-restore
